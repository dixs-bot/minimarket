<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>MiniMarket</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
<script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter']}}}}</script>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{overscroll-behavior:none}
body{font-family:Inter,sans-serif;background:#f1f5f9;color:#1e293b}
.hs{overflow-x:auto;-webkit-overflow-scrolling:touch;-ms-overflow-style:none;scrollbar-width:none}
.hs::-webkit-scrollbar{display:none}
.bsh{transform:translateY(100%);transition:transform .2s ease}
.bsh.a{transform:translateY(0)}
.ov{opacity:0;pointer-events:none;transition:opacity .15s}
.ov.a{opacity:1;pointer-events:auto}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.5;pointer-events:none}
.st{padding-bottom:env(safe-area-inset-bottom)}
.err{border-color:#ef4444!important;background:#fef2f2}
.sel{border-color:#2563eb;background:#eff6ff}
.stb{background:#dbeafe;color:#1e40af}
</style>
</head>
<body class="min-h-screen">

<!-- Header -->
<header class="fixed top-0 left-0 right-0 z-40 bg-white h-12 flex items-center px-3 border-b">
<div class="flex items-center gap-2">
<div class="w-7 h-7 bg-blue-600 rounded flex items-center justify-center">
<svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.3 2.3c-.6.6-.2 1.7.7 1.7H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
</div>
<span class="font-bold text-sm">MiniMarket</span>
</div>
</header>

<!-- Main -->
<main id="M" class="pt-12 st" style="padding-bottom:72px">
<!-- Home -->
<div id="PH" class="p-2">
<div id="CT" class="hs flex gap-1 pb-1"></div>
<div class="flex justify-between items-center py-2">
<b class="text-sm">Produk</b>
<small id="PC" class="text-gray-400 text-xs">0</small>
</div>
<div id="PD" class="grid grid-cols-2 gap-2"></div>
</div>
<!-- History -->
<div id="PHX" class="p-2 hidden">
<b class="text-sm block mb-2">Riwayat</b>
<div id="HL"></div>
<div id="HE" class="text-center py-8 hidden">
<p class="text-gray-400 text-sm mb-2">Belum ada pesanan</p>
<button data-act="home" class="px-4 py-2 bg-blue-600 text-white rounded text-sm">Belanja</button>
</div>
</div>
</main>

<!-- Nav -->
<nav class="fixed bottom-0 left-0 right-0 bg-white border-t z-40 st">
<div class="flex justify-around py-1" id="NV">
<button data-act="home" class="flex flex-col items-center py-2 px-6 text-blue-600">
<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
<span class="text-xs">Beranda</span>
</button>
<button data-act="hist" class="flex flex-col items-center py-2 px-6 text-gray-400">
<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
<span class="text-xs">Pesanan</span>
</button>
</div>
</nav>

<!-- Cart Button -->
<button id="CB" data-act="cart" class="fixed right-2 bottom-16 w-11 h-11 bg-blue-600 text-white rounded-xl hidden z-30 btn" style="box-shadow:0 2px 8px rgba(37,99,235,.3)">
<svg class="w-5 h-5 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.3 2.3c-.6.6-.2 1.7.7 1.7H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
<span id="CBN" class="absolute -top-1 -right-1 w-4 h-4 bg-red-500 text-white text-xs rounded-full flex items-center justify-center">0</span>
</button>

<!-- Overlay -->
<div id="OV" class="ov fixed inset-0 bg-black/25 z-50"></div>

<!-- Cart Sheet -->
<div id="CS" class="bsh fixed bottom-0 left-0 right-0 bg-white rounded-t-xl z-50 max-h-[80vh] flex flex-col st">
<div class="flex justify-between p-3 border-b h-12 items-center">
<b class="text-sm">Keranjang</b>
<button data-act="xcart" class="w-7 h-7 bg-gray-100 rounded btn text-sm">✕</button>
</div>
<div id="CI" class="flex-1 overflow-auto p-2 space-y-2"></div>
<div id="CE" class="hidden flex-1 flex flex-col items-center justify-center p-4">
<p class="text-gray-400 text-sm mb-2">Kosong</p>
<button data-act="xcart" class="px-4 py-2 bg-blue-600 text-white rounded text-sm">Belanja</button>
</div>
<div id="CF" class="p-2 border-t">
<div class="flex justify-between mb-2 text-sm"><span class="text-gray-500">Total</span><b id="CT" class="text-blue-600">Rp 0</b></div>
<button data-act="chk" class="w-full py-2.5 bg-blue-600 text-white rounded font-semibold text-sm btn">Checkout</button>
</div>
</div>

<!-- Checkout -->
<div id="CH" class="fixed inset-0 bg-gray-100 z-50 hidden overflow-auto">
<div class="sticky top-0 bg-white border-b h-11 flex items-center px-2 z-10">
<button data-act="xchk" class="w-8 h-8 bg-gray-100 rounded btn text-sm">←</button>
<b class="ml-2 text-sm">Checkout</b>
</div>
<div class="p-2 pb-24 space-y-2">
<!-- Address -->
<div class="bg-white rounded p-2">
<label class="text-xs font-semibold text-gray-600">1. Alamat <span id="AE" class="text-red-500 hidden">*Wajib</span></label>
<textarea id="IA" class="w-full p-2 border rounded text-sm mt-1" rows="2" placeholder="Alamat lengkap..."></textarea>
</div>
<!-- Shipping -->
<div class="bg-white rounded p-2">
<label class="text-xs font-semibold text-gray-600">2. Pengiriman <span id="SE" class="text-red-500 hidden">*Pilih</span></label>
<div id="SH" class="mt-1 space-y-1"></div>
</div>
<!-- Payment -->
<div class="bg-white rounded p-2">
<label class="text-xs font-semibold text-gray-600">3. Pembayaran <span id="PE" class="text-red-500 hidden">*Pilih</span></label>
<div id="PM" class="mt-1 space-y-1"></div>
</div>
<!-- Summary -->
<div class="bg-white rounded p-2">
<label class="text-xs font-semibold text-gray-600">Ringkasan</label>
<div id="SI" class="text-xs space-y-1 my-2 pb-1 border-b"></div>
<div class="text-xs space-y-1">
<div class="flex justify-between"><span class="text-gray-500">Subtotal</span><span id="SS">Rp 0</span></div>
<div class="flex justify-between"><span class="text-gray-500">Ongkir</span><span id="SO">Rp 0</span></div>
<div class="flex justify-between pt-1 border-t font-bold"><span>Total</span><span id="ST" class="text-blue-600">Rp 0</span></div>
</div>
</div>
<!-- Notes -->
<div class="bg-white rounded p-2">
<label class="text-xs font-semibold text-gray-600">Catatan</label>
<textarea id="IN" class="w-full p-2 border rounded text-sm mt-1" rows="1" placeholder="Opsional"></textarea>
</div>
</div>
<div class="fixed bottom-0 left-0 right-0 bg-white border-t p-2 st flex items-center justify-between">
<small id="FH" class="text-gray-400 text-xs">Lengkapi data</small>
<button id="OB" data-act="ord" disabled class="py-2.5 px-6 bg-gray-200 text-gray-400 rounded font-semibold text-sm btn">Pesan</button>
</div>
</div>

<!-- Confirm -->
<div id="CF" class="fixed inset-0 bg-black/25 z-60 hidden flex items-center justify-center p-4">
<div class="bg-white rounded p-4 w-full max-w-xs text-center">
<b class="block mb-1">Konfirmasi Pesanan</b>
<p class="text-gray-500 text-xs mb-3">Yakin ingin memesan?</p>
<div class="flex gap-2">
<button data-act="xcf" class="flex-1 py-2 bg-gray-100 rounded text-sm btn">Batal</button>
<button data-act="sbm" class="flex-1 py-2 bg-blue-600 text-white rounded text-sm btn">Ya, Pesan</button>
</div>
</div>
</div>

<!-- Invoice -->
<div id="IV" class="fixed inset-0 bg-gray-100 z-50 hidden overflow-auto">
<div class="sticky top-0 bg-white border-b h-11 flex items-center px-2 z-10">
<button data-act="xiv" class="w-8 h-8 bg-gray-100 rounded btn text-sm">✕</button>
<b class="ml-2 text-sm">Invoice</b>
</div>
<div id="IC" class="p-2 pb-20"></div>
<div class="fixed bottom-0 left-0 right-0 bg-white border-t p-2 st">
<button data-act="wa" class="w-full py-2.5 bg-green-600 text-white rounded font-semibold text-sm btn">Kirim ke WhatsApp</button>
</div>
</div>

<!-- Toast -->
<div id="TO" class="fixed bottom-16 left-2 right-2 bg-gray-800 text-white p-2 rounded text-xs text-center z-50 opacity-0 transition-opacity">.</div>

<script>
// === DATA ===
const D=[
{id:1,n:'Chitato 68g',p:12000,c:'snacks',i:'https://images.unsplash.com/photo-1566478989037-eec170784d0b?w=120&h=120&fit=crop'},
{id:2,n:'Lays BBQ',p:11000,c:'snacks',i:'https://images.unsplash.com/photo-1585232004423-244e01769049?w=120&h=120&fit=crop'},
{id:3,n:'Oreo 133g',p:15000,c:'snacks',i:'https://images.unsplash.com/photo-1548907040-4baa42d10919?w=120&h=120&fit=crop'},
{id:4,n:'Good Day',p:5000,c:'drinks',i:'https://images.unsplash.com/photo-1461023058943-07fcbe16d92a?w=120&h=120&fit=crop'},
{id:5,n:'Teh Pucuk',p:4000,c:'drinks',i:'https://images.unsplash.com/photo-1556679343-c7306c1976bc?w=120&h=120&fit=crop'},
{id:6,n:'Aqua 600ml',p:4000,c:'drinks',i:'https://images.unsplash.com/photo-1548839140-29a749e1f16a?w=120&h=120&fit=crop'},
{id:7,n:'Indomie',p:3500,c:'snacks',i:'https://images.unsplash.com/photo-1612929633738-8fe44f7ec841?w=120&h=120&fit=crop'},
{id:8,n:'Ultra Milk',p:18000,c:'dairy',i:'https://images.unsplash.com/photo-1550583724-b2692b85b150?w=120&h=120&fit=crop'}
];
const CTG=[{id:'all',n:'Semua'},{id:'snacks',n:'Makanan'},{id:'drinks',n:'Minuman'},{id:'dairy',n:'Susu'}];
const SHP=[{id:'gojek',n:'Gojek',pr:15000,e:'1-2 jam'},{id:'grab',n:'Grab',pr:15000,e:'1-2 jam'},{id:'shopee',n:'Shopee',pr:9000,e:'2-3 hari'},{id:'pickup',n:'Ambil',pr:0,e:'Langsung'}];
const PMT=[{id:'cod',n:'COD',d:'Bayar di tempat'},{id:'transfer',n:'Transfer',d:'BCA, Mandiri'},{id:'qris',n:'QRIS',d:'Scan QR'}];
const WN='6285189976233';

// === STATE ===
let C=[],O=[],SC='all',CU=null;
const S={a:'',s:'',p:''};

// === DOM ===
const $=x=>document.getElementById(x);
const H={M:$('M'),CT:$('CT'),PD:$('PD'),PC:$('PC'),CB:$('CB'),CBN:$('CBN'),CS:$('CS'),CI:$('CI'),CE:$('CE'),CT:$('CT'),OV:$('OV'),CH:$('CH'),IA:$('IA'),AE:$('AE'),SH:$('SH'),SE:$('SE'),PM:$('PM'),PE:$('PE'),SI:$('SI'),SS:$('SS'),SO:$('SO'),ST:$('ST'),IN:$('IN'),OB:$('OB'),FH:$('FH'),CF:$('CF'),IV:$('IV'),IC:$('IC'),HL:$('HL'),HE:$('HE'),TO:$('TO')};

// === HELPERS ===
const fm=n=>'Rp '+n.toLocaleString('id-ID');
const to=m=>{H.TO.textContent=m;H.TO.style.opacity=1;setTimeout(()=>H.TO.style.opacity=0,2000)};

// === RENDER CATEGORIES ===
const rCt=()=>{H.CT.innerHTML=CTG.map(c=>`<button data-ct="${c.id}" class="px-3 py-1.5 rounded text-xs font-medium whitespace-nowrap ${SC===c.id?'bg-blue-600 text-white':'bg-white border'}">${c.n}</button>`).join('')};

// === RENDER PRODUCTS (INITIAL ONLY) ===
const rP=()=>{
H.PC.textContent=D.length;
H.PD.innerHTML=D.map(p=>`<div class="bg-white rounded border">
<div class="aspect-square bg-gray-50 rounded overflow-hidden"><img src="${p.i}" class="w-full h-full object-cover" loading="lazy"></div>
<div class="p-2">
<p class="text-xs font-medium line-clamp-2">${p.n}</p>
<b class="text-blue-600 text-sm">${fm(p.p)}</b>
<div id="P${p.id}" class="mt-1.5"></div>
</div></div>`).join('');
uPA();
};

// === UPDATE PRODUCT UI (PARTIAL) ===
const uPA=()=>{D.forEach(p=>{const el=$('P'+p.id);if(!el)return;const c=C.find(x=>x.id===p.id);el.innerHTML=c?`<div class="flex items-center justify-between bg-blue-50 rounded p-1">
<button data-u="-" data-p="${p.id}" class="w-7 h-7 bg-white border rounded flex items-center justify-center">-</button>
<b>${c.q}</b>
<button data-u="+" data-p="${p.id}" class="w-7 h-7 bg-blue-600 text-white rounded flex items-center justify-center">+</button>
</div>`:`<button data-u="+" data-p="${p.id}" class="w-full py-1.5 bg-blue-600 text-white rounded text-xs">+ Tambah</button>`})};

// === UPDATE CART ITEM UI (PARTIAL) ===
const uCI=id=>{
const el=$('CI'+id);const it=C.find(x=>x.id===id);
if(!el){H.CI.insertAdjacentHTML('beforeend',`<div id="CI${it.id}" class="flex gap-2 bg-gray-50 rounded p-2 items-center"></div>`);uCI(id);return}
if(!it){el.remove();return}
el.innerHTML=`<img src="${it.i}" class="w-12 h-12 rounded object-cover">
<div class="flex-1 min-w-0"><p class="text-xs truncate">${it.n}</p><b class="text-blue-600 text-xs">${fm(it.p)}</b></div>
<div class="flex items-center gap-1">
<button data-u="-" data-c="${it.id}" class="w-6 h-6 bg-white border rounded flex items-center justify-center">-</button>
<b class="w-4 text-center text-xs">${it.q}</b>
<button data-u="+" data-c="${it.id}" class="w-6 h-6 bg-blue-600 text-white rounded flex items-center justify-center">+</button>
</div>`;
H.CT.textContent=fm(C.reduce((s,i)=>s+i.p*i.q,0));
};

// === UPDATE CART BADGE ===
const uCB=()=>{const t=C.reduce((s,i)=>s+i.q,0);H.CBN.textContent=t;H.CB.classList.toggle('hidden',!t)};

// === RENDER SHIPPING ===
const rSH=()=>{H.SH.innerHTML=SHP.map(s=>`<label class="flex items-center gap-2 p-1.5 rounded border cursor-pointer ${S.s===s.id?'sel':''}">
<input type="radio" name="sh" value="${s.id}" ${S.s===s.id?'checked':''}>
<span class="flex-1"><b class="text-xs">${s.n}</b><small class="block text-gray-400">${s.e}</small></span>
<b class="text-xs ${s.pr===0?'text-green-600':''}">${s.pr?fm(s.pr):'Gratis'}</b>
</label>`).join('')};

// === RENDER PAYMENT ===
const rPM=()=>{H.PM.innerHTML=PMT.map(p=>`<label class="flex items-center gap-2 p-1.5 rounded border cursor-pointer ${S.p===p.id?'sel':''}">
<input type="radio" name="pm" value="${p.id}" ${S.p===p.id?'checked':''}>
<span><b class="text-xs">${p.n}</b><small class="block text-gray-400">${p.d}</small></span>
</label>`).join('')};

// === UPDATE SUMMARY ===
const uSM=()=>{
const st=C.reduce((s,i)=>s+i.p*i.q,0);
const sh=SHP.find(x=>x.id===S.s);
H.SI.innerHTML=C.map(i=>`<span class="truncate">${i.n} x${i.q}</span><span>${fm(i.p*i.q)}</span>`).join('');
H.SS.textContent=fm(st);
H.SO.textContent=sh?sh.pr?fm(sh.pr):'Gratis':'-';
H.ST.textContent=fm(st+(sh?sh.pr:0));
};

// === VALIDATE ===
const vF=()=>{
const ok=S.a&&S.s&&S.p;
H.OB.disabled=!ok;
H.OB.className=ok?'py-2.5 px-6 bg-blue-600 text-white rounded font-semibold text-sm btn':'py-2.5 px-6 bg-gray-200 text-gray-400 rounded font-semibold text-sm btn';
H.FH.textContent=ok?'Siap':'Lengkapi: '+(S.a?'':'alamat ')+(S.s?'':'kirim ')+(S.p?'':'bayar');
return ok;
};

// === INVOICE ===
const rI=()=>{
if(!CU)return;
const o=CU;
H.IC.innerHTML=`<div class="bg-blue-600 text-white p-3 rounded text-center"><b class="text-lg">Berhasil</b><small class="block opacity-80">#${o.id}</small></div>
<div class="bg-white rounded mt-2 p-2 space-y-1 text-xs">
<div><b>Status:</b> <span class="stb px-1.5 py-0.5 rounded">${o.st}</span></div>
<div><b>Alamat:</b> ${o.a}</div>
<div><b>Pengiriman:</b> ${o.sh.n}</div>
<div><b>Pembayaran:</b> ${o.pm.n}</div>
<div class="pt-1 border-t font-bold">Total: <span class="text-blue-600">${fm(o.t)}</span></div>
</div>`;
};

// === HISTORY ===
const rH=()=>{
if(!O.length){H.HL.innerHTML='';H.HE.classList.remove('hidden');return}
H.HE.classList.add('hidden');
H.HL.innerHTML=O.slice().reverse().map(o=>`<div class="bg-white rounded p-2 mb-1">
<div class="flex justify-between text-xs mb-1"><span class="text-gray-400">#${o.id}</span><span class="stb px-1.5 py-0.5 rounded">${o.st}</span></div>
<b class="text-blue-600 text-sm">${fm(o.t)}</b>
<button data-hi="${o.id}" class="text-blue-600 text-xs ml-2">Detail</button>
</div>`).join('');
};

// === CART ===
const uC=(id,ch)=>{
const ex=C.find(x=>x.id===id),pr=D.find(x=>x.id===id);
if(ex){ex.q+=ch;if(ex.q<1)C=C.filter(x=>x.id!==id)}
else if(ch>0)C.push({id:pr.id,n:pr.n,p:pr.p,i:pr.i,q:1});
localStorage.setItem('C',JSON.stringify(C));
uCB();
uPA();
if(C.find(x=>x.id===id))uCI(id);
else if(H.CS.classList.contains('a'))H.CI.innerHTML=C.map(i=>{uCI(i.id);return''}).join('');
H.CT.textContent=fm(C.reduce((s,i)=>s+i.p*i.q,0));
if(!C.length)H.CE.classList.remove('hidden');else H.CE.classList.add('hidden');
};

// === MODAL OPS ===
const oC=()=>{if(!C.length){to('Kosong');return}H.CI.innerHTML='';C.forEach(i=>uCI(i.id));H.CE.classList.add('hidden');H.CS.classList.add('a');H.OV.classList.add('a')};
const xC=()=>{H.CS.classList.remove('a');H.OV.classList.remove('a')};
const oCh=()=>{if(!C.length){to('Kosong');return}xC();S.a=S.s=S.p='';H.IA.value='';H.IN.value='';rSH();rPM();uSM();vF();H.CH.classList.remove('hidden')};
const xCh=()=>{H.CH.classList.add('hidden')};
const oCf=()=>{if(!vF()){to('Lengkapi data');return}H.CF.classList.remove('hidden')};
const xCf=()=>{H.CF.classList.add('hidden')};
const oI=()=>{H.IV.classList.remove('hidden')};
const xI=()=>{H.IV.classList.add('hidden')};

// === SUBMIT ===
const sb=()=>{
xCf();
const sh=SHP.find(x=>x.id===S.s),pm=PMT.find(x=>x.id===S.p);
if(!sh||!pm){to('Error');return}
const st=C.reduce((s,i)=>s+i.p*i.q,0);
CU={id:Date.now(),it:[...C],a:S.a,sh,pm,t:st+sh.pr,st:'diproses'};
O.push(CU);C=[];
localStorage.setItem('C','[]');localStorage.setItem('O',JSON.stringify(O));
uCB();uPA();
rI();oI();
};

// === WHATSAPP ===
const sWA=()=>{
if(!CU){to('No order');return}
const o=CU;
let t=`PESANAN #${o.id}\n\nAlamat:\n${o.a}\n\nItem:\n`;
o.it.forEach(i=>t+=`- ${i.n} x${i.q} = ${fm(i.p*i.q)}\n`);
t+=`\nKirim: ${o.sh.n}\nBayar: ${o.pm.n}\n\nTOTAL: ${fm(o.t)}\n\nMohon proses`;
location.href=`https://wa.me/${WN}?text=`+encodeURIComponent(t);
};

// === NAV ===
const sw=x=>{
H.PH.classList.toggle('hidden',x!=='home');
H.PHX.classList.toggle('hidden',x!=='hist');
document.querySelectorAll('[data-act]').forEach(b=>{
if(['home','hist'].includes(b.dataset.act)){b.classList.toggle('text-blue-600',b.dataset.act===x);b.classList.toggle('text-gray-400',b.dataset.act!==x)}
});
if(x==='hist')rH();
};

// === EVENT DELEGATION ===
document.addEventListener('click',e=>{
const a=e.target.dataset.act,u=e.target.dataset.u,p=+e.target.dataset.p,c=+e.target.dataset.c,ct=e.target.dataset.ct,hi=e.target.dataset.hi;

if(ct){SC=ct;rCt();const f=ct==='all'?D:D.filter(x=>x.c===ct);H.PC.textContent=f.length;H.PD.innerHTML=f.map(x=>`<div class="bg-white rounded border">
<div class="aspect-square bg-gray-50 rounded overflow-hidden"><img src="${x.i}" class="w-full h-full object-cover" loading="lazy"></div>
